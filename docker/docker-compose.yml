services:
  app:
    container_name: bunvel-app
    image: bunvel/app:1.0.0
    restart: unless-stopped
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - PORT=8000
      - NODE_ENV=production
      - JWT_SECRET=${JWT_SECRET}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET}
      - JWT_EXPIRES_IN=${JWT_EXPIRES_IN}
      - JWT_REFRESH_EXPIRES_IN=${JWT_REFRESH_EXPIRES_IN}
      - RATE_LIMIT_WINDOW_MS=${RATE_LIMIT_WINDOW_MS}
      - RATE_LIMIT_MAX_REQUESTS=${RATE_LIMIT_MAX_REQUESTS}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGREST_URL=http://rest:8001
      - VITE_BUNVEL_STUDIO_URL=http://${DOMAIN}:3000
      - DEFAULT_ORGANIZATION=${DEFAULT_ORGANIZATION}
      - DEFAULT_PROJECT=${DEFAULT_PROJECT}
      - LOG_LEVEL=${LOG_LEVEL}
    networks:
      - bunvel-network

  studio:
    container_name: bunvel-studio
    image: bunvel/studio:1.0.0
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      app:
        condition: service_started
    environment:
      - PORT=3000
      - NODE_ENV=production
      - VITE_API_URL=http://${DOMAIN}:8000
      - VITE_BUNVEL_STUDIO_URL=http://${DOMAIN}:3000
    networks:
      - bunvel-network

  postgres:
    container_name: bunvel-postgres
    image: postgres:18.4-bookworm
    restart: unless-stopped
    shm_size: 128mb
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_INITDB_ARGS: --data-checksums
    volumes:
      - postgres_data:/var/lib/postgresql
      - ./volumes/db:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 5s
    networks:
      - bunvel-network

  rest:
    container_name: bunvel-rest
    image: postgrest/postgrest:v14.5
    restart: unless-stopped
    ports:
      - "8001:8001"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGRST_DB_URI: "postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}"
      PGRST_DB_SCHEMA: public
      PGRST_DB_ANON_ROLE: ${POSTGRES_USER}
      PGRST_SERVER_PORT: 8001
    networks:
      - bunvel-network

volumes:
  postgres_data:

networks:
  bunvel-network:
    driver: bridge
