services:
  app:
    container_name: bunvel-app
    image: bunvel/app:1.0.0
    restart: unless-stopped
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - PORT=8000
      - NODE_ENV=production
      - DATABASE_URL=${DATABASE_URL}
      - BETTER_AUTH_SECRET=${BETTER_AUTH_SECRET}
      - BETTER_AUTH_URL=${BETTER_AUTH_URL}
      - ADMIN_EMAIL=${ADMIN_EMAIL}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
      - RATE_LIMIT_WINDOW_MS=${RATE_LIMIT_WINDOW_MS}
      - RATE_LIMIT_MAX_REQUESTS=${RATE_LIMIT_MAX_REQUESTS}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
      - VITE_BUNVEL_STUDIO_URL=${VITE_BUNVEL_STUDIO_URL}
      - DEFAULT_ORGANIZATION=${DEFAULT_ORGANIZATION}
      - DEFAULT_PROJECT=${DEFAULT_PROJECT}
      - LOG_LEVEL=${LOG_LEVEL}
    networks:
      - bunvel-network

  studio:
    container_name: bunvel-studio
    image: bunvel/studio:1.0.0
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      app:
        condition: service_started
    environment:
      - PORT=3000
      - NODE_ENV=production
      - VITE_API_URL=http://${DOMAIN}:8000
      - VITE_BUNVEL_STUDIO_URL=http://${DOMAIN}:3000
    networks:
      - bunvel-network

  postgres:
    container_name: bunvel-postgres
    image: postgres:18.4
    restart: unless-stopped
    shm_size: 128mb
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_INITDB_ARGS: --data-checksums
    volumes:
      - postgres_data:/var/lib/postgresql
      - ./volumes/db:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 5s
    networks:
      - bunvel-network

volumes:
  postgres_data:

networks:
  bunvel-network:
    driver: bridge
