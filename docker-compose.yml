services:
  app:
    container_name: bunvel-app
    image: bunvel/app
    build:
      context: ./app
      dockerfile: Dockerfile.dev
    ports:
      - "8000:8000"
    environment:
      - PORT=8000
      - NODE_ENV=development
      - RATE_LIMIT_WINDOW_MS=${RATE_LIMIT_WINDOW_MS}
      - RATE_LIMIT_MAX_REQUESTS=${RATE_LIMIT_MAX_REQUESTS}
      - DATABASE_URL=${DATABASE_URL}
      - BETTER_AUTH_SECRET=${BETTER_AUTH_SECRET}
      - BETTER_AUTH_URL=${BETTER_AUTH_URL}
      - ADMIN_EMAIL=${ADMIN_EMAIL}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
      - VITE_BUNVEL_STUDIO_URL=${VITE_BUNVEL_STUDIO_URL}
      - DEFAULT_ORGANIZATION=${DEFAULT_ORGANIZATION}
      - DEFAULT_PROJECT=${DEFAULT_PROJECT}
      - LOG_LEVEL=${LOG_LEVEL}
    volumes:
      - ./app:/app
    networks:
      - bunvel-network
    depends_on:
      postgres:
        condition: service_healthy

  studio:
    container_name: bunvel-studio
    image: bunvel/studio
    build:
      context: ./studio
      dockerfile: Dockerfile.dev
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - NODE_ENV=development
      - VITE_API_URL=${VITE_API_URL}
      - VITE_BUNVEL_STUDIO_URL=${VITE_BUNVEL_STUDIO_URL}
    volumes:
      - ./studio:/app
    networks:
      - bunvel-network
    depends_on:
      app:
        condition: service_started

  postgres:
    container_name: bunvel-postgres
    image: postgres:18.4
    shm_size: 128mb
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_INITDB_ARGS: --data-checksums
    volumes:
      - postgres_data:/var/lib/postgresql
      - ./docker/volumes/db:/docker-entrypoint-initdb.d
    networks:
      - bunvel-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d bunvel"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 5s

volumes:
  postgres_data:

networks:
  bunvel-network:
    driver: bridge
