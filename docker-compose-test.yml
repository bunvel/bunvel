services:
  app:
    container_name: bunvel-app
    image: bunvel/app
    build: 
      context: ./app
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - NODE_ENV=test
      - JWT_SECRET=${JWT_SECRET}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET}
      - JWT_EXPIRES_IN=${JWT_EXPIRES_IN:-15m}
      - JWT_REFRESH_EXPIRES_IN=${JWT_REFRESH_EXPIRES_IN:-7d}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-http://localhost:3000}
      - RATE_LIMIT_WINDOW_MS=${RATE_LIMIT_WINDOW_MS:-900000}
      - RATE_LIMIT_MAX_REQUESTS=${RATE_LIMIT_MAX_REQUESTS:-100}
      - REDIS_URL=${REDIS_URL:-redis://cache:6379}
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - POSTGRES_DB=${POSTGRES_DB:-bunvel}
      - POSTGREST_URL=${POSTGREST_URL:-http://rest:8001}
    networks:
      - bunvel-network
    depends_on:
      postgres:
        condition: service_healthy
      cache:
        condition: service_healthy
  
  studio:
    container_name: bunvel-studio
    image: bunvel/studio
    build: 
      context: ./studio
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=test
      - API_URL=${API_URL:-http://localhost:8000}
      - BUNVEL_STUDIO_URL=${BUNVEL_STUDIO_URL:-http://localhost:3000}
      - STUDIO_DEFAULT_ORGANIZATION=${STUDIO_DEFAULT_ORGANIZATION:-Default Organization}
      - STUDIO_DEFAULT_PROJECT=${STUDIO_DEFAULT_PROJECT:-Default Project}
    networks:
      - bunvel-network
    depends_on:
      app:
        condition: service_started

  postgres:
    container_name: bunvel-postgres
    image: postgres:18.1
    shm_size: 128mb
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-bunvel}
      POSTGRES_INITDB_ARGS: --data-checksums
    volumes:
      - postgres_data:/var/lib/postgresql
      - ./app/src/database/migrations:/docker-entrypoint-initdb.d
    networks:
      - bunvel-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d bunvel"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 5s

  cache:
    container_name: bunvel-cache
    image: valkey/valkey:9.0.1
    command: valkey-server --save 60 1 --loglevel warning
    volumes:
      - cache_data:/data
    networks:
      - bunvel-network
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  rest:
    container_name: bunvel-rest
    image: postgrest/postgrest:v14.1
    restart: always
    environment:
      PGRST_DB_URI: "postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-bunvel}"
      PGRST_DB_SCHEMA: public
      PGRST_DB_ANON_ROLE: ${POSTGRES_USER:-postgres}
      PGRST_SERVER_PORT: 8001
    networks:
      - bunvel-network
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8001"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  postgres_data:
  cache_data:

networks:
  bunvel-network:
    driver: bridge
